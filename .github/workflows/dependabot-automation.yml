name: Dependabot Automation

on:
  pull_request:

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  dependabot-automation:
    name: dependabot-automation
    runs-on: ubuntu-latest
    if: github.event.pull_request.user.login == 'dependabot[bot]'
    steps:
      - id: metadata
        uses: dependabot/fetch-metadata@d7267f607e9d3fb96fc2fbe83e0af444713e90b7 # v2.3.0
        with:
          github-token: "${{ secrets.GITHUB_TOKEN }}"

      - name: Label production dependency updates
        if: steps.metadata.outputs.dependency-type == 'direct:production'
        run: gh pr edit "$PR_URL" --add-label "production-dependency"
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Set DEPENDABOT_AUTOMERGE_ENABLED=true only after branch protection and required checks are verified.
      - name: Enable auto-merge for low-risk updates
        if: |
          vars.DEPENDABOT_AUTOMERGE_ENABLED == 'true' &&
          steps.metadata.outputs.dependency-type != 'direct:production' &&
          (
            steps.metadata.outputs.update-type == 'version-update:semver-patch' ||
            steps.metadata.outputs.update-type == 'version-update:semver-minor'
          )
        run: gh pr merge --auto --squash "$PR_URL"
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}